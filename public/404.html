<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Centro de Mando — Project Lead Ecomex</title>
    <script>
        // GitHub Pages SPA redirect trick.
        // Encodes the current path into a query param and redirects to index.html.
        // segmentCount = 1 matches the single-segment base path: /Project-lead-ui/
        var seg = 1;
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
            l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
            (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>

<body></body>

</html>
